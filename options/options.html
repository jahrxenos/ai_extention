<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <title>Настройки — Адаптация текста</title>
  <link rel="stylesheet" href="options.css" />
</head>
<body>
  <div class="page">
    <div class="section">
      <div class="section-header">Groq API</div>
      <div class="section-body">
        <p class="section-desc">
          Бесплатный ключ: <a href="https://console.groq.com/keys" target="_blank">console.groq.com/keys</a>
        </p>
        <div class="field">
          <label for="apiKey">API-ключ</label>
          <div class="row">
            <input type="password" id="apiKey" class="input" placeholder="gsk_…" autocomplete="off" spellcheck="false" />
            <button id="toggleKey" class="icon-btn" title="Показать / скрыть">👁</button>
          </div>
        </div>
        <div class="actions">
          <button id="btnSave" class="btn btn-primary">Сохранить</button>
          <button id="btnTest" class="btn btn-secondary">Проверить ключ</button>
        </div>
        <div id="status" class="status" hidden></div>
      </div>
    </div>
  </div>
  <script src="options.js"></script>
</body>
</html>
